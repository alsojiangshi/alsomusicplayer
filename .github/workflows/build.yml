name: Build 6 Portable Releases

on:
  push: { tags: ['v*'] }
  workflow_dispatch:

jobs:
  cli-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with: { bun-version: latest }
      - run: bun install
      - run: bun build --compile --target=bun-linux-x64-modern packages/cli/src/main.ts --outfile dist/MusicPlayer-cli-linux
      - run: cd dist && tar -czf MusicPlayer-cli-linux-x86_64.tar.gz MusicPlayer-cli-linux
      - uses: actions/upload-artifact@v4
        with: { name: cli-linux, path: dist/MusicPlayer-cli-linux-x86_64.tar.gz }

  cli-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with: { bun-version: latest }
      - run: bun install
      - run: bun build --compile --target=bun-windows-x64-modern packages/cli/src/main.ts --outfile dist/MusicPlayer-cli-windows.exe
      - run: cd dist && zip MusicPlayer-cli-windows-x86_64.zip MusicPlayer-cli-windows.exe
      - uses: actions/upload-artifact@v4
        with: { name: cli-windows, path: dist/MusicPlayer-cli-windows-x86_64.zip }

  gui-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with: { bun-version: latest }
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: bun install && cd packages/gui && bun run tauri build --target x86_64-unknown-linux-gnu
      - run: cd packages/gui/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb && tar -czf MusicPlayer-gui-linux-x86_64.tar.gz music-player_*.deb 2>/dev/null || tar -czf ../../../../../../dist/MusicPlayer-gui-linux-x86_64.tar.gz -C packages/gui/src-tauri/target/x86_64-unknown-linux-gnu/release music-player
      - uses: actions/upload-artifact@v4
        with: { name: gui-linux, path: '**/MusicPlayer-gui-linux-x86_64.tar.gz' }

  gui-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with: { bun-version: latest }
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: bun install && cd packages/gui && bun run tauri build --target x86_64-pc-windows-msvc
      - run: Compress-Archive -Path packages/gui/src-tauri/target/x86_64-pc-windows-msvc/release/music-player.exe -DestinationPath dist/MusicPlayer-gui-windows-x86_64.zip
      - uses: actions/upload-artifact@v4
        with: { name: gui-windows, path: dist/MusicPlayer-gui-windows-x86_64.zip }

  full-linux:
    runs-on: ubuntu-latest
    needs: [cli-linux, gui-linux]
    steps:
      - uses: actions/download-artifact@v4
      - run: mkdir -p dist && cp cli-linux/MusicPlayer-cli-linux-x86_64.tar.gz dist/ && cp gui-linux/MusicPlayer-gui-linux-x86_64.tar.gz dist/ && cd dist && tar -czf MusicPlayer-full-linux-x86_64.tar.gz *.tar.gz

  full-windows:
    runs-on: ubuntu-latest
    needs: [cli-windows, gui-windows]
    steps:
      - uses: actions/download-artifact@v4
      - run: mkdir -p dist && cp cli-windows/MusicPlayer-cli-windows-x86_64.zip dist/ && cp gui-windows/MusicPlayer-gui-windows-x86_64.zip dist/ && cd dist && zip MusicPlayer-full-windows-x86_64.zip *.zip

  release:
    needs: [cli-linux, cli-windows, gui-linux, gui-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
      - run: mkdir release && find . -name '*.tar.gz' -o -name '*.zip' | xargs -I{} cp {} release/ && ls -lh release/
      - uses: softprops/action-gh-release@v2
        with: { files: release/*, generate_release_notes: true }
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
