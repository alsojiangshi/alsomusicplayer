name: Build Portable Releases

on:
  push: { tags: ['v*'] }
  workflow_dispatch:

jobs:
  cli-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: mkdir -p dist && bun build --compile --target=bun-linux-x64-modern packages/cli/src/main.ts --outfile dist/MusicPlayer-cli-linux
      - run: cd dist && tar -czf MusicPlayer-cli-linux-x86_64.tar.gz MusicPlayer-cli-linux
      - uses: actions/upload-artifact@v4
        with: { name: cli-linux, path: dist/MusicPlayer-cli-linux-x86_64.tar.gz }

  cli-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: mkdir -p dist && bun build --compile --target=bun-windows-x64-modern packages/cli/src/main.ts --outfile dist/MusicPlayer-cli-windows.exe
      - run: cd dist && zip MusicPlayer-cli-windows-x86_64.zip MusicPlayer-cli-windows.exe
      - uses: actions/upload-artifact@v4
        with: { name: cli-windows, path: dist/MusicPlayer-cli-windows-x86_64.zip }

  gui-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with: { toolchain: stable }
      - run: bun install
      - run: cd packages/gui && bunx --bun vite build 2>&1
      - run: cd packages/gui && bunx tauri build 2>&1
      - run: |
          mkdir -p dist
          find packages/gui/src-tauri/target -name 'music-player' -type f -exec cp {} dist/MusicPlayer-gui-linux \;
          cd dist && tar -czf MusicPlayer-gui-linux-x86_64.tar.gz MusicPlayer-gui-linux 2>/dev/null || echo "Tauri binary not found, check build logs"
      - uses: actions/upload-artifact@v4
        with: { name: gui-linux, path: dist/MusicPlayer-gui-linux-x86_64.tar.gz }

  gui-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with: { toolchain: stable }
      - run: bun install
      - run: cd packages/gui; bunx --bun vite build 2>&1
      - run: cd packages/gui; bunx tauri build 2>&1
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          $exe = Get-ChildItem -Path packages/gui/src-tauri/target -Recurse -Filter music-player.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName dist/MusicPlayer-gui-windows.exe
            Compress-Archive -Path dist/MusicPlayer-gui-windows.exe -DestinationPath dist/MusicPlayer-gui-windows-x86_64.zip
          } else { echo "Tauri exe not found" }
      - uses: actions/upload-artifact@v4
        with: { name: gui-windows, path: dist/MusicPlayer-gui-windows-x86_64.zip }

  release:
    needs: [cli-linux, cli-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
      - run: mkdir -p release && find . -name '*.tar.gz' -o -name '*.zip' | grep -v full | xargs -I{} cp {} release/
      - uses: softprops/action-gh-release@v2
        with: { files: release/*, generate_release_notes: true }
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
