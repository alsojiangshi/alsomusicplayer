name: Desktop Build

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - run: node .github/scripts/release-meta.mjs validate
      - name: Install Linux system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev patchelf
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm test:core
      - run: cargo test --manifest-path packages/gui/src-tauri/Cargo.toml

  build-linux:
    runs-on: ubuntu-22.04
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - run: node .github/scripts/release-meta.mjs validate
      - name: Install Linux system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev patchelf
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/gui
          args: --target x86_64-unknown-linux-gnu
      - name: Normalize Linux artifact names
        run: |
          mkdir -p dist/linux
          VERSION="$(node .github/scripts/release-meta.mjs artifact-version)"
          PRODUCT="$(node .github/scripts/release-meta.mjs product-name)"
          APPIMAGE="$(find packages/gui/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage -name '*.AppImage' | head -n 1)"
          cp "$APPIMAGE" "dist/linux/${PRODUCT}-gui-${VERSION}-linux-x64-appimage.AppImage"
      - uses: actions/upload-artifact@v4
        with:
          name: gui-linux
          path: dist/linux

  build-windows:
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - run: node .github/scripts/release-meta.mjs validate
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/gui
          args: --target x86_64-pc-windows-msvc
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          $artifactVersion = node .github/scripts/release-meta.mjs artifact-version
          $productName = node .github/scripts/release-meta.mjs product-name
          $setupName = "$productName-gui-$artifactVersion-windows-x64-setup.exe"
          $portableName = "$productName-gui-$artifactVersion-windows-x64-portable.zip"
          $releaseDir = Join-Path $PWD 'packages/gui/src-tauri/target/x86_64-pc-windows-msvc/release'
          $setupSource = Get-ChildItem -Path packages/gui/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis -File -Filter *.exe | Select-Object -First 1
          Copy-Item -LiteralPath $setupSource.FullName -Destination (Join-Path $PWD "dist/windows/$setupName") -Force
          $portableDir = Join-Path $PWD 'dist/windows/portable'
          $portableZip = Join-Path $PWD "dist/windows/$portableName"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item -LiteralPath (Join-Path $releaseDir 'also-music-player.exe') -Destination (Join-Path $portableDir "$productName.exe") -Force
          foreach ($pattern in @('*.dll', '*.pak', '*.dat', '*.bin', '*.json')) {
            Get-ChildItem -Path $releaseDir -File -Filter $pattern -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $portableDir $_.Name) -Force
            }
          }
          foreach ($directoryName in @('locales', 'resources')) {
            $sourceDir = Join-Path $releaseDir $directoryName
            if (Test-Path $sourceDir) {
              Copy-Item -LiteralPath $sourceDir -Destination (Join-Path $portableDir $directoryName) -Recurse -Force
            }
          }
          if (Test-Path $portableZip) { Remove-Item -LiteralPath $portableZip -Force }
          Compress-Archive -Path (Join-Path $portableDir '*') -DestinationPath $portableZip -CompressionLevel Optimal
      - uses: actions/upload-artifact@v4
        with:
          name: gui-windows
          path: dist/windows

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
      - uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
