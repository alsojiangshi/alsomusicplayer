name: Build All

on:
  push: { tags: ['v*'] }
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── CLI 构建 (bun compile, 已验证稳定) ────────────────
  cli-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: mkdir -p dist && bun build --compile --target=bun-linux-x64-modern packages/cli/src/main.ts --outfile dist/MusicPlayer-cli-linux
      - run: cd dist && tar -czf MusicPlayer-cli-linux-x86_64.tar.gz MusicPlayer-cli-linux
      - uses: actions/upload-artifact@v4
        with: { name: cli-linux, path: dist/MusicPlayer-cli-linux-x86_64.tar.gz }

  cli-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: mkdir -p dist && bun build --compile --target=bun-windows-x64-modern packages/cli/src/main.ts --outfile dist/MusicPlayer-cli-windows.exe
      - run: cd dist && zip MusicPlayer-cli-windows-x86_64.zip MusicPlayer-cli-windows.exe
      - uses: actions/upload-artifact@v4
        with: { name: cli-windows, path: dist/MusicPlayer-cli-windows-x86_64.zip }

  # ── GUI 构建 (Tauri 官方 Action) ──────────────────────
  gui-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev patchelf
      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
      - run: bun install
      - run: cd packages/gui && bunx --bun vite build
      - uses: tauri-apps/tauri-action@v0
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
        with:
          projectPath: packages/gui
          args: --target x86_64-unknown-linux-gnu
      - run: |
          mkdir -p dist/gui-linux
          find packages/gui/src-tauri/target -name '*.deb' -o -name '*.AppImage' -o -name 'music-player' -type f | head -5 | while read f; do cp "$f" dist/gui-linux/; done
          cd dist && tar -czf MusicPlayer-gui-linux-x86_64.tar.gz -C gui-linux .
      - uses: actions/upload-artifact@v4
        with: { name: gui-linux, path: dist/MusicPlayer-gui-linux-x86_64.tar.gz }

  gui-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: install Rust
        uses: dtolnay/rust-toolchain@stable
      - run: bun install
      - run: cd packages/gui; bunx --bun vite build
      - uses: tauri-apps/tauri-action@v0
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
        with:
          projectPath: packages/gui
          args: --target x86_64-pc-windows-msvc
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          $exe = Get-ChildItem -Path packages/gui/src-tauri/target -Recurse -Filter music-player.exe | Select-Object -First 1
          if ($exe) {
            Compress-Archive -Path $exe.FullName -DestinationPath dist/MusicPlayer-gui-windows-x86_64.zip
          }
      - uses: actions/upload-artifact@v4
        with: { name: gui-windows, path: dist/MusicPlayer-gui-windows-x86_64.zip }

  # ── 发布 ──────────────────────────────────────────────
  release:
    needs: [cli-linux, cli-windows, gui-linux, gui-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions: { contents: write }
    steps:
      - uses: actions/download-artifact@v4
      - run: mkdir -p release && find . -name '*.tar.gz' -o -name '*.zip' | xargs -I{} cp {} release/ && ls -lh release/
      - uses: softprops/action-gh-release@v2
        with: { files: release/* }
        env: { GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
