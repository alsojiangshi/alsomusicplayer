name: Desktop Build

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev patchelf
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm test:core
      - run: cargo test --manifest-path packages/gui/src-tauri/Cargo.toml

  build-linux:
    runs-on: ubuntu-22.04
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev patchelf
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/gui
          args: --target x86_64-unknown-linux-gnu
      - run: |
          mkdir -p dist/linux
          find packages/gui/src-tauri/target -name '*.AppImage' -o -name '*.deb' | while read f; do cp "$f" dist/linux/; done
      - uses: actions/upload-artifact@v4
        with:
          name: gui-linux
          path: dist/linux

  build-windows:
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/gui
          args: --target x86_64-pc-windows-msvc
      - shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          Get-ChildItem -Path packages/gui/src-tauri/target -Recurse -Include *.exe,*.msi,*.nsis.zip | Copy-Item -Destination dist/windows -Force
      - uses: actions/upload-artifact@v4
        with:
          name: gui-windows
          path: dist/windows

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
      - uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
